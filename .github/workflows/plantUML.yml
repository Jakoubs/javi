name: Generate PlantUML Diagrams

on:
  push:
    branches: [ main ]
    paths:
      - "diagrams/**/*.puml"
      - "!diagrams/generated/scala-architecture.puml"
  workflow_run:
    workflows: ["Generate Scala PUML from Source"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  plantuml:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.head_branch == 'main')

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install PlantUML dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y graphviz plantuml

      - name: Generate SVG diagrams
        run: sh ./scripts/generate-diagrams.sh

      - name: Commit and push diagram changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add out
          git diff --cached --quiet && exit 0
          git commit -m "docs: update PlantUML diagrams [skip ci]"
          git push