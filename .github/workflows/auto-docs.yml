name: Generate Scala PUML from Source

on:
  push:
    branches: [ main ]
    paths:
      - "src/main/scala/**/*.scala"
      - "scripts/generate-scala-puml.py"
      - ".github/workflows/auto-docs.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-puml:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Generate PUML from Scala source
        run: python3 ./scripts/generate-scala-puml.py

      - name: Commit and push generated PUML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add diagrams/generated/scala-architecture.puml
          git diff --cached --quiet && exit 0
          git commit -m "docs: update Scala source PlantUML"
          git push