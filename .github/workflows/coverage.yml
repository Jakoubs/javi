name: Coverage Report

on:
  push:
  pull_request:

jobs:
  coverage:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        
    - name: Setup SBT
      uses: sbt/setup-sbt@v1
          
    - name: Run tests with coverage
      run: sbt clean coverage test
      
    - name: Generate coverage report
      run: sbt coverageReport
      
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        file: ./target/scala-3.3.1/scoverage-report/scoverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        
    - name: Upload coverage to Coveralls
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: sbt coveralls || echo "Coveralls upload failed"
        
    - name: Coverage Summary
      run: |
        echo "## 📊 Coverage Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ -f "target/scala-3.3.1/scoverage-report/scoverage.xml" ]; then
          COVERAGE=$(xmllint --xpath "string(//@statement-rate)" target/scala-3.3.1/scoverage-report/scoverage.xml 2>/dev/null || echo "N/A")
          echo "- **Statement Coverage**: ${COVERAGE}%" >> $GITHUB_STEP_SUMMARY
          
          if (( $(echo "$COVERAGE >= 80" | bc -l) )); then
            echo "- ✅ **Status**: Meets minimum target (80%)" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ⚠️ **Status**: Below minimum target (80%)" >> $GITHUB_STEP_SUMMARY
          fi
        else
          echo "- **Statement Coverage**: Not available" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        
    - name: Archive coverage reports
      uses: actions/upload-artifact@v4
      with:
        name: coverage-reports
        path: |
          target/scala-3.3.1/scoverage-report/
          target/scala-3.3.1/coverage-report/
        retention-days: 30
