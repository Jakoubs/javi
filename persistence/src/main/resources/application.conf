chess.persistence {

  # Which backend to use: "slick" or "mongo"
  backend = "slick"
  backend = ${?CHESS_PERSISTENCE_BACKEND}

  slick {
    url       = "jdbc:postgresql://localhost:5432/chess"
    url       = ${?CHESS_DB_URL}
    user      = "chess"
    user      = ${?CHESS_DB_USER}
    password  = "chess"
    password  = ${?CHESS_DB_PASSWORD}
    driver    = "org.postgresql.Driver"
    pool-size = 10
  }

  mongo {
    uri      = "mongodb://localhost:27017"
    uri      = ${?CHESS_MONGO_URI}
    database = "chess"
    database = ${?CHESS_MONGO_DATABASE}
  }
}
