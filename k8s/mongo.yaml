apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
  namespace: javi
  labels:
    app.kubernetes.io/name: javi
    app.kubernetes.io/component: mongo
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: javi
      app.kubernetes.io/component: mongo
  template:
    metadata:
      labels:
        app.kubernetes.io/name: javi
        app.kubernetes.io/component: mongo
    spec:
      containers:
        - name: mongo
          image: mongo:7
          ports:
            - name: mongo
              containerPort: 27017
          env:
            - name: MONGO_INITDB_DATABASE
              value: chess
---
apiVersion: v1
kind: Service
metadata:
  name: mongo
  namespace: javi
  labels:
    app.kubernetes.io/name: javi
    app.kubernetes.io/component: mongo
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: javi
    app.kubernetes.io/component: mongo
  ports:
    - name: mongo
      port: 27017
      targetPort: mongo
