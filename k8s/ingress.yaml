apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: javi
  namespace: javi
  labels:
    app.kubernetes.io/name: javi
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: rest
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: webui
                port:
                  name: http
