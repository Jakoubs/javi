apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: javi
  labels:
    app.kubernetes.io/name: javi
    app.kubernetes.io/component: postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: javi
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: javi
        app.kubernetes.io/component: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: chess
            - name: POSTGRES_USER
              value: chess
            - name: POSTGRES_PASSWORD
              value: chess
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: javi
  labels:
    app.kubernetes.io/name: javi
    app.kubernetes.io/component: postgres
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: javi
    app.kubernetes.io/component: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
